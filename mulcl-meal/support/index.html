<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>물클 식단표 지원</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.6; padding: 24px; }
    h1 { margin-top: 0; }
    a { color: #0d6efd; }
    .box { border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; background: #fff; }
  </style>
</head>
<body>
  <h1>물클 식단표 지원(지원 URL)</h1>
  <p>물클 식단표 앱 사용 중 불편사항이나 오류가 있다면 아래 방법으로 알려주세요.</p>

  <div class="box">
    <h2>1) GitHub Issues로 문의/버그 신고</h2>
    <p>최대한 상세히 적어주세요.</p>
    <ul>
      <li>사용 기기/OS 버전 (예: iPhone, iOS 17)</li>
      <li>문제가 발생한 화면/단계</li>
      <li>재현 방법</li>
    </ul>
    <p><a href="https://github.com/gonejiwon/gonejiwon.github.io/issues/new" target="_blank" rel="noopener noreferrer">GitHub Issues 열기</a></p>
  </div>

  <div class="box" style="margin-top: 16px;">
    <h2>2) 앱 소개 페이지</h2>
    <p><a href="https://gonejiwon.github.io/mulcl-meal/">마케팅 URL(앱 소개)</a></p>
  </div>

  <footer style="margin-top: 24px; color: #6b7280;">
    <p>마지막 업데이트: 2026-03-29</p>
  </footer>
</body>
</html>
